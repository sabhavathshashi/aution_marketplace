{% extends "base.html" %}
{% block content %}
<h2>Create Auction Listing</h2>
<form method="POST">
    <div class="form-group">
        <label>Item Title</label>
        <input type="text" name="title" required>
    </div>
    <div class="form-group">
        <label>Item Description</label>
        <textarea name="description" rows="4" required></textarea>
    </div>
    <div class="form-group">
        <label>Starting Price (₹)</label>
        <input type="number" step="0.01" name="start_price" required>
    </div>
    <div class="form-group">
        <label>Reserve Price (₹) [Optional]</label>
        <input type="number" step="0.01" name="reserve_price">
    </div>
    <div class="form-group">
        <label>End Time</label>
        <input type="datetime-local" name="end_time" required>
    </div>
    <button type="submit" class="btn">List Item</button>
</form>
{% endblock %}
