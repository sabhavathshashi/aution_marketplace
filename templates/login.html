{% extends "base.html" %}
{% block content %}
<div class="form-shell">
    <h2>Welcome back</h2>
    <p>Sign in to manage your auctions, place bids, and track your activity in one place.</p>
    <form method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
</div>
{% endblock %}
